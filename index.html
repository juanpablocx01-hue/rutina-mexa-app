<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuerzaMexa App Pro</title>
  
  <!-- 1. Cargar Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. Cargar React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 3. Cargar Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. Cargar Íconos -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 5. Herramienta para leer archivos de Excel (.xlsx) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- 6. Herramientas de Base de Datos en la Nube (SUPABASE) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f8fafc;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ==========================================
    // ☁️ CONFIGURACIÓN DE SUPABASE Y ADMIN
    // ==========================================
    // 1. Pega aquí tus credenciales de Supabase (Project Settings -> API)
    const SUPABASE_URL = "https://bbqgjvcevlnjdqrrthhh.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJicWdqdmNldmxuamRxcnJ0aGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzU3MjIsImV4cCI6MjA5MDg1MTcyMn0.tQHqFypApbDkVzSWEo4Xe6YY0ndjF4j8vQL_E4O2Mu0";  
    
    // 2. Pon tu correo real aquí para tener permisos de ADMINISTRADOR
    const ADMIN_EMAIL = "jantonio.as@gmail.com"; 

    // Componente auxiliar para íconos
    const Icon = ({ name, size = 24, className = "" }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current) {
          iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({ root: iconRef.current, attrs: { class: className, width: size, height: size } });
        }
      }, [name, size, className]);

      return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
    };

    // ==========================================
    // COMPONENTE: PANTALLA DE LOGIN (SIN REGISTRO)
    // ==========================================
    function AuthScreen({ supabaseClient }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      useEffect(() => { lucide.createIcons(); });

      const handleAuth = async (e) => {
        e.preventDefault();
        setLoading(true);
        setErrorMsg('');

        try {
          const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } catch (error) {
          setErrorMsg("Correo o contraseña incorrectos. Verifica tus datos.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans">
          <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md">
            <div className="text-center mb-8">
              <h1 className="text-4xl font-black text-blue-950 tracking-tight mb-2">FuerzaMexa <span className="text-blue-600">Pro</span></h1>
              <p className="text-slate-500">Inicia sesión para ver tu entrenamiento</p>
            </div>

            {errorMsg && (
              <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm font-medium mb-6 border border-red-100 flex items-start gap-2">
                <Icon name="alert-circle" size={18} className="shrink-0 mt-0.5" /> {errorMsg}
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1">Correo electrónico</label>
                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="ejemplo@correo.com" />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                <input type="password" required minLength="6" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••••" />
              </div>
              
              <button type="submit" disabled={loading} className="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3.5 rounded-xl transition shadow-md disabled:opacity-70">
                {loading ? 'Ingresando...' : 'Ingresar'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // COMPONENTE: REPRODUCTOR DE RUTINA
    // ==========================================
    function WorkoutPlayer({ routine, onGoBack }) {
      const workoutPlan = routine.exercises;
      const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
      const [currentSet, setCurrentSet] = useState(1);
      const [isResting, setIsResting] = useState(false);
      const [timeLeft, setTimeLeft] = useState(0);
      const [voiceEnabled, setVoiceEnabled] = useState(false);
      const [ttsEnabled, setTtsEnabled] = useState(true);
      const [isFinished, setIsFinished] = useState(false);
      const [totalSeconds, setTotalSeconds] = useState(0);
      const [isVideoMuted, setIsVideoMuted] = useState(true);
      const [musicUrl, setMusicUrl] = useState(null);
      const [musicName, setMusicName] = useState("");
      const [isTheaterMode, setIsTheaterMode] = useState(false);

      const timerRef = useRef(null);
      const recognitionRef = useRef(null);
      const currentExercise = workoutPlan[currentExerciseIndex];

      useEffect(() => { setIsTheaterMode(false); }, [currentExerciseIndex]);

      useEffect(() => {
        if (!('webkitSpeechRecognition' in window)) return;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognitionRef.current = new SpeechRecognition();
        recognitionRef.current.continuous = true;
        recognitionRef.current.lang = 'es-ES';
        recognitionRef.current.interimResults = false;

        recognitionRef.current.onresult = (event) => {
          const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
          if (transcript.includes('siguiente') || transcript.includes('listo') || transcript.includes('terminé') || transcript.includes('termine')) {
            handleNext();
          } else if (transcript.includes('ampliar')) {
            setIsTheaterMode(true);
          } else if (transcript.includes('reducir')) {
            setIsTheaterMode(false);
          }
        };

        recognitionRef.current.onend = () => {
          if (voiceEnabled) { try { recognitionRef.current.start(); } catch (e) { } }
        };

        return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
      }, [voiceEnabled, currentExerciseIndex, currentSet, isResting]);

      useEffect(() => {
        if (voiceEnabled && recognitionRef.current) {
          try { recognitionRef.current.start(); } catch (e) { }
        } else if (!voiceEnabled && recognitionRef.current) {
          recognitionRef.current.stop();
        }
      }, [voiceEnabled]);

      const speak = useCallback((text) => {
        if (!ttsEnabled || !('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-MX';
        window.speechSynthesis.speak(utterance);
      }, [ttsEnabled]);

      useEffect(() => {
        if (currentExercise && !isResting && !isFinished) {
          speak(`Comenzamos con. ${currentExercise.name}. ${currentExercise.reps}.`);
        }
      }, [currentExerciseIndex, isResting, isFinished, speak]);

      useEffect(() => {
        if (isResting && timeLeft > 0) {
          timerRef.current = setTimeout(() => {
            if (timeLeft === 6) speak("Prepárate para continuar, quedan 5 segundos.");
            setTimeLeft(prev => prev - 1);
          }, 1000);
        } else if (isResting && timeLeft === 0) {
          speak("El tiempo de recuperación ha concluido. ¡A darle!");
          setIsResting(false);
          if (currentSet < currentExercise.sets) {
            setCurrentSet(prev => prev + 1);
          } else {
            advanceExercise();
          }
        }
        return () => clearTimeout(timerRef.current);
      }, [isResting, timeLeft]);

      useEffect(() => {
        let globalTimer;
        if (!isFinished) globalTimer = setInterval(() => setTotalSeconds(prev => prev + 1), 1000);
        return () => clearInterval(globalTimer);
      }, [isFinished]);

      const handleNext = () => {
        if (isResting) {
          setIsResting(false);
          if (currentSet < currentExercise.sets) {
            setCurrentSet(prev => prev + 1);
          } else {
            advanceExercise();
          }
          return;
        }

        if (currentSet < currentExercise.sets) {
          let restTimeForThisSet = 0;
          if (currentExercise.rests && currentExercise.rests.length > 0) {
            restTimeForThisSet = currentExercise.rests[currentSet - 1] || 0;
          } else if (currentExercise.rest) {
            restTimeForThisSet = currentExercise.rest;
          }

          if (restTimeForThisSet > 0) {
            setIsResting(true);
            setTimeLeft(restTimeForThisSet);
            speak(`Serie completada. Tienes ${restTimeForThisSet} segundos de recuperación.`);
          } else {
            setCurrentSet(prev => prev + 1);
          }
        } else {
          let restAfter = currentExercise.restAfterExercise || 0;
          
          if (restAfter > 0 && currentExerciseIndex < workoutPlan.length - 1) {
            setIsResting(true);
            setTimeLeft(restAfter);
            speak(`Ejercicio completado. Descansa ${restAfter} segundos antes de pasar al siguiente ejercicio.`);
          } else {
            advanceExercise();
          }
        }
      };

      const advanceExercise = () => {
        if (currentExerciseIndex < workoutPlan.length - 1) {
          setCurrentExerciseIndex(prev => prev + 1);
          setCurrentSet(1);
        } else {
          setIsFinished(true);
          speak("¡Rutina completada! Excelente trabajo.");
        }
      };

      const jumpToExercise = (index) => {
        setCurrentExerciseIndex(index);
        setCurrentSet(1);
        setIsResting(false);
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      const formatGlobalTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
      };

      const handleMusicUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setMusicUrl(URL.createObjectURL(file));
          setMusicName(file.name);
        }
      };

      if (workoutPlan.length === 0) {
        return <div className="p-10 text-center"><h2 className="text-2xl">Esta rutina no tiene ejercicios.</h2><button onClick={onGoBack} className="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Volver</button></div>;
      }

      if (isFinished) {
        return (
          <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col items-center justify-center p-6 font-sans">
            <Icon name="check-circle" size={96} className="text-blue-900 mb-6" />
            <h1 className="text-4xl font-bold mb-4 text-blue-950">¡Entrenamiento Completado!</h1>
            <p className="text-slate-600 text-lg mb-8">Has superado la rutina: {routine.name}</p>
            <div className="flex gap-4">
              <button onClick={() => { setIsFinished(false); setCurrentExerciseIndex(0); setCurrentSet(1); }} className="px-8 py-3 bg-blue-900 hover:bg-blue-800 text-white rounded-xl font-semibold transition shadow-lg">
                Repetir Rutina
              </button>
              <button onClick={onGoBack} className="px-8 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-xl font-semibold transition shadow-lg">
                Ir al Inicio
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col lg:flex-row overflow-hidden">
          <aside className="w-full lg:w-96 bg-white border-r border-slate-200 flex flex-col h-[40vh] lg:h-screen shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-30">
            <div className="p-6 border-b border-slate-100 bg-white sticky top-0 z-10">
              <div className="flex justify-between items-center mb-2">
                <button onClick={onGoBack} className="text-slate-400 hover:text-blue-900 transition-colors" title="Volver al inicio">
                  <Icon name="arrow-left" size={24} />
                </button>
                <h2 className="text-xl font-bold text-blue-950 truncate flex-1 ml-3">{routine.name}</h2>
              </div>
              <div className="w-full bg-slate-100 rounded-full h-1.5 mt-4">
                <div className="bg-blue-900 h-1.5 rounded-full transition-all duration-500" style={{ width: `${(currentExerciseIndex / workoutPlan.length) * 100}%` }} />
              </div>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
              {workoutPlan.map((ex, index) => {
                const isActive = index === currentExerciseIndex;
                const isPast = index < currentExerciseIndex;
                const showBlockHeader = index === 0 || workoutPlan[index - 1].block !== ex.block;

                return (
                  <React.Fragment key={index}>
                    {showBlockHeader && (
                      <div className="mt-6 mb-3 first:mt-2">
                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest pl-2">{ex.block}</h3>
                      </div>
                    )}
                    <button onClick={() => jumpToExercise(index)} className={`w-full text-left p-3 rounded-xl mb-1 transition-all flex items-center gap-4 ${isActive ? 'bg-blue-900 text-white shadow-md' : 'hover:bg-slate-50 bg-transparent'} ${isPast ? 'opacity-60' : 'opacity-100'}`}>
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 text-sm font-semibold transition-colors ${isActive ? 'bg-white text-blue-900' : isPast ? 'bg-slate-200 text-slate-500' : 'bg-slate-100 text-slate-500'}`}>
                        {isPast ? <Icon name="check-circle" size={16} /> : index + 1}
                      </div>
                      <div className="flex-1 overflow-hidden">
                        <h4 className={`truncate font-medium ${isActive ? 'text-white' : isPast ? 'text-slate-500 line-through decoration-slate-300' : 'text-slate-700'}`}>{ex.name}</h4>
                        <p className={`text-xs ${isActive ? 'text-blue-200' : 'text-slate-500'}`}>{ex.sets}x{ex.reps}</p>
                      </div>
                    </button>
                  </React.Fragment>
                );
              })}
            </div>

            <div className="p-4 border-t border-slate-200 bg-slate-50 z-20">
              <h3 className="text-sm font-bold text-blue-950 mb-3 flex items-center gap-2">
                <Icon name="music" size={16} className="text-blue-900" /> Tu Música Personalizada
              </h3>
              {!musicUrl ? (
                <label className="cursor-pointer w-full bg-white border border-blue-200 hover:border-blue-400 hover:bg-blue-50 text-blue-900 text-sm font-semibold py-2.5 px-4 rounded-xl flex items-center justify-center transition-all shadow-sm">
                  <input type="file" accept="audio/*" className="hidden" onChange={handleMusicUpload} />
                  Cargar audio (MP3)
                </label>
              ) : (
                <div className="flex flex-col gap-2">
                  <p className="text-xs font-medium text-slate-600 truncate bg-slate-200/50 px-2 py-1 rounded-md" title={musicName}>{musicName}</p>
                  <audio src={musicUrl} controls loop className="w-full h-10 rounded-lg" autoPlay />
                  <button onClick={() => { setMusicUrl(null); URL.revokeObjectURL(musicUrl); }} className="text-xs text-slate-500 hover:text-red-600 text-center mt-1 font-medium transition-colors">Quitar pista</button>
                </div>
              )}
            </div>
          </aside>

          <main className={`flex-1 flex flex-col h-screen overflow-y-auto relative transition-all duration-500 ${isTheaterMode ? 'p-2 lg:p-4 bg-slate-950' : 'p-4 lg:p-10'}`}>
            <div className={`justify-between items-center mb-6 lg:mb-8 bg-white/50 backdrop-blur-sm p-4 rounded-2xl border border-slate-200 shadow-sm ${isTheaterMode ? 'hidden' : 'flex'}`}>
              <div className="flex items-center gap-3">
                <span className="px-4 py-1.5 bg-blue-50 text-blue-900 rounded-full text-sm font-bold tracking-wide uppercase border border-blue-100">{currentExercise.block}</span>
                <span className="text-slate-500 font-medium text-sm hidden md:block">Ejercicio {currentExerciseIndex + 1} de {workoutPlan.length}</span>
              </div>
              <div className="flex gap-2 items-center">
                <div className="hidden sm:flex items-center gap-2 bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-medium border border-slate-200 mr-2">
                  <Icon name="clock" size={18} className="text-slate-400" />
                  <span className="tabular-nums tracking-wide">{formatGlobalTime(totalSeconds)}</span>
                </div>
                <button onClick={() => setIsVideoMuted(!isVideoMuted)} className={`p-3 rounded-xl transition-all border hidden sm:flex items-center gap-2 ${!isVideoMuted ? 'bg-indigo-50 text-indigo-900 border-indigo-200' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>
                  <Icon name={!isVideoMuted ? 'volume-2' : 'volume-x'} size={20} />
                </button>
                <button onClick={() => setTtsEnabled(!ttsEnabled)} className={`p-3 rounded-xl transition-all border flex items-center gap-2 ${ttsEnabled ? 'bg-blue-50 text-blue-900 border-blue-100' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>
                  <Icon name={ttsEnabled ? 'volume-2' : 'volume-x'} size={20} />
                  <span className="hidden lg:inline text-sm font-semibold">Voz Guía</span>
                </button>
                <button onClick={() => setVoiceEnabled(!voiceEnabled)} className={`px-4 py-2 rounded-xl flex items-center gap-2 transition-all border ${voiceEnabled ? 'bg-blue-900 text-white border-blue-900 shadow-md animate-pulse' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                  <Icon name={voiceEnabled ? 'mic' : 'mic-off'} size={20} />
                </button>
              </div>
            </div>

            <div className={`flex flex-col mx-auto w-full relative transition-all duration-500 ${isTheaterMode ? 'max-w-full flex-1' : 'max-w-4xl flex-1'}`}>
              
              {isResting && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-md rounded-3xl p-4 border border-blue-100 shadow-2xl">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-xl border border-slate-100">
                    <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-blue-100">
                      <Icon name="clock" size={48} className="text-blue-900" />
                    </div>
                    <h2 className="text-2xl text-slate-500 font-medium mb-2">Descanso Activo</h2>
                    <div className="text-7xl md:text-8xl font-black text-blue-950 tabular-nums tracking-tighter mb-6 drop-shadow-sm">{formatTime(timeLeft)}</div>
                    
                    <p className="text-lg text-slate-600 bg-slate-50 px-6 py-3 rounded-xl border border-slate-100 mb-6 font-medium">
                      {currentSet < currentExercise.sets 
                        ? <span>Prepárate para la serie <strong className="text-blue-900 text-xl">{currentSet + 1}</strong></span>
                        : <span>Prepárate para el <strong className="text-blue-900 text-xl">siguiente ejercicio</strong></span>
                      }
                    </p>
                    
                    <button onClick={handleNext} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                      <Icon name="skip-forward" size={20} /> Saltar
                    </button>
                  </div>
                </div>
              )}

              <div className={`flex flex-col h-full transition-all duration-700 ${isResting ? 'opacity-40 blur-sm pointer-events-none' : 'opacity-100'}`}>
                <h1 className={`font-extrabold text-blue-950 mb-6 leading-tight ${isTheaterMode ? 'hidden' : 'text-3xl md:text-5xl'}`}>{currentExercise.name}</h1>
                
                <div className={`w-full bg-slate-950 overflow-hidden relative border border-slate-200 transition-all duration-500 ${isTheaterMode ? 'flex-1 rounded-2xl mb-4 border-slate-800' : 'aspect-video rounded-3xl shadow-xl mb-8'}`}>
                  <button onClick={() => setIsTheaterMode(!isTheaterMode)} className="absolute top-4 right-4 z-20 p-2.5 bg-slate-900/60 hover:bg-slate-800/80 text-white rounded-xl backdrop-blur-md transition-all shadow-lg border border-white/10" title={isTheaterMode ? "Reducir video" : "Ampliar video"}>
                    <Icon name={isTheaterMode ? "minimize" : "maximize"} size={24} />
                  </button>
                  {isTheaterMode && (
                    <div className="absolute top-4 left-4 z-20 flex gap-2 pointer-events-none">
                      <div className="bg-slate-900/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10"><h2 className="text-white font-bold text-lg">{currentExercise.name}</h2></div>
                      <div className="bg-blue-600/80 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10"><span className="text-white font-bold text-lg">Serie {currentSet} / {currentExercise.sets}</span></div>
                    </div>
                  )}
                  {currentExercise.videoUrl ? (
                    currentExercise.videoUrl.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i) ? (
                      <img key={currentExercise.videoUrl} className="absolute top-0 left-0 w-full h-full object-contain" src={currentExercise.videoUrl} alt={currentExercise.name} />
                    ) : (
                      <video key={currentExercise.videoUrl} className="absolute top-0 left-0 w-full h-full object-contain" src={currentExercise.videoUrl} autoPlay loop muted={isVideoMuted} playsInline controls />
                    )
                  ) : (
                    <div className="w-full h-full flex flex-col items-center justify-center text-slate-600">
                      <Icon name="play-circle" size={48} className="mb-4 opacity-50" />
                      <p>Multimedia no disponible</p>
                    </div>
                  )}
                </div>

                <div className={`grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 ${isTheaterMode ? 'hidden' : ''}`}>
                  <div className="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm"><span className="text-slate-500 text-sm mb-2 flex items-center gap-2 font-medium"><Icon name="activity" size={16} className="text-blue-900"/> Series</span><span className="text-3xl font-black text-blue-950">{currentSet} <span className="text-lg font-medium text-slate-400">/ {currentExercise.sets}</span></span></div>
                  <div className="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm"><span className="text-slate-500 text-sm mb-2 flex items-center gap-2 font-medium"><Icon name="dumbbell" size={16} className="text-blue-900"/> Reps</span><span className="text-3xl font-black text-blue-950">{currentExercise.reps}</span></div>
                  <div className="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm col-span-2"><span className="text-slate-500 text-sm mb-2 flex items-center gap-2 font-medium"><Icon name="flame" size={16} className="text-blue-900"/> Intensidad</span><span className="text-2xl font-bold text-slate-700">{currentExercise.intensity}</span></div>
                </div>

                <div className={`bg-white border border-slate-200 p-6 rounded-2xl flex gap-4 items-start shadow-sm mb-4 ${isTheaterMode ? 'hidden' : ''}`}>
                  <div className="bg-blue-50 p-3 rounded-xl shrink-0"><Icon name="info" size={24} className="text-blue-900" /></div>
                  <div><h4 className="text-blue-950 font-bold mb-1">Enfoque / Beneficio</h4><p className="text-slate-600 leading-relaxed font-medium">{currentExercise.benefits}</p></div>
                </div>
              </div>
            </div>

            <div className={`mt-auto sticky bottom-0 bg-gradient-to-t ${isTheaterMode ? 'from-slate-950 via-slate-950' : 'from-slate-50 via-slate-50'} to-transparent pb-4 lg:pb-0 z-20 ${isResting ? 'opacity-0 pointer-events-none' : 'transition-colors duration-500'}`}>
              <button onClick={handleNext} className="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold text-xl py-5 rounded-2xl shadow-[0_8px_30px_rgb(30,58,138,0.3)] transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                <Icon name="check-circle" size={24} /> {currentSet === currentExercise.sets ? "Completar Ejercicio" : "Serie Terminada"}
              </button>
            </div>
          </main>
        </div>
      );
    }

    // ==========================================
    // COMPONENTE: CREADOR DE RUTINAS
    // ==========================================
    function RoutineCreator({ initialRoutine, onSave, onCancel }) {
      const [routineName, setRoutineName] = useState(initialRoutine ? initialRoutine.name : "");
      
      const [isPublic, setIsPublic] = useState(initialRoutine?.assignedTo === "todos" || !initialRoutine);
      
      const [exercises, setExercises] = useState(initialRoutine ? initialRoutine.exercises : []);
      const [editingExerciseIndex, setEditingExerciseIndex] = useState(null);
      
      const defaultEx = {
        block: "Fuerza", name: "", sets: 3, reps: "10", intensity: "Moderado", rests: [60, 60], restAfterExercise: 90, benefits: "", videoUrl: ""
      };
      const [newEx, setNewEx] = useState(defaultEx);

      useEffect(() => { lucide.createIcons(); });

      const handleSetsChange = (val) => {
        const newSets = Number(val);
        let newRests = [...newEx.rests];
        
        if (newSets > 1) {
          const lastRest = newRests.length > 0 ? newRests[newRests.length - 1] : 60;
          while (newRests.length < newSets - 1) { newRests.push(lastRest); }
          if (newRests.length > newSets - 1) { newRests = newRests.slice(0, newSets - 1); }
        } else {
          newRests = []; 
        }
        setNewEx({ ...newEx, sets: newSets, rests: newRests });
      };

      const handleRestTimeChange = (index, val) => {
        const updatedRests = [...newEx.rests];
        updatedRests[index] = Number(val);
        setNewEx({ ...newEx, rests: updatedRests });
      };

      const handleAddExercise = () => {
        if (!newEx.name) {
          alert("Debes ponerle nombre al ejercicio.");
          return;
        }

        if (editingExerciseIndex !== null) {
          const updated = [...exercises];
          updated[editingExerciseIndex] = { ...newEx, id: exercises[editingExerciseIndex].id || Date.now() };
          setExercises(updated);
          setEditingExerciseIndex(null);
        } else {
          setExercises([...exercises, { ...newEx, id: Date.now() }]);
        }
        setNewEx({ ...defaultEx, block: newEx.block });
      };

      const handleEditExercise = (index) => {
        setNewEx(exercises[index]);
        setEditingExerciseIndex(index);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleRemoveExercise = (index) => {
        const updated = [...exercises];
        updated.splice(index, 1);
        setExercises(updated);
        if (editingExerciseIndex === index) {
          setEditingExerciseIndex(null);
          setNewEx(defaultEx);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = window.XLSX.read(bstr, { type: 'binary' });
            
            let importedExercises = [];
            
            wb.SheetNames.forEach(sheetName => {
              const ws = wb.Sheets[sheetName];
              const rawData = window.XLSX.utils.sheet_to_json(ws, { header: 1 });
              
              if (rawData.length < 2) return; 
              
              let headerRowIdx = -1;
              let colMap = {};
              
              for (let i = 0; i < Math.min(rawData.length, 15); i++) {
                const row = rawData[i] || [];
                const rowStr = row.map(c => String(c || '').toLowerCase().trim());
                
                if (rowStr.some(c => c.includes('ejercicio') || c.includes('nombre') || c.includes('repeticion') || c.includes('reps'))) {
                  headerRowIdx = i;
                  
                  // 🟢 CORRECCIÓN: Búsqueda de columnas a prueba de errores tipográficos y columnas fantasma.
                  rowStr.forEach((colName, colIdx) => {
                    if (colMap.block === undefined && /bloque|tipo|semana|día|dia/i.test(colName)) colMap.block = colIdx;
                    if (colMap.name === undefined && /ejercicio|nombre|movimiento/i.test(colName)) colMap.name = colIdx;
                    if (colMap.sets === undefined && /serie|set/i.test(colName)) colMap.sets = colIdx;
                    if (colMap.reps === undefined && /repeticion|reps/i.test(colName)) colMap.reps = colIdx;
                    
                    if (colMap.restAfter === undefined && (/final|transición|transicion|post|entre ejercicio/i.test(colName) || colName === 'descanso final')) {
                      colMap.restAfter = colIdx;
                    } else if (colMap.rest === undefined && /descanso|descanzo|rest|pausa|recuperacion|recuperación|tiempo/i.test(colName)) {
                      colMap.rest = colIdx;
                    }
                    
                    if (colMap.intensity === undefined && /intensidad|peso|rpe/i.test(colName)) colMap.intensity = colIdx;
                    if (colMap.benefits === undefined && /nota|beneficio|detalle/i.test(colName)) colMap.benefits = colIdx;
                    if (colMap.video === undefined && /video|enlace|link|url|imagen|foto/i.test(colName)) colMap.video = colIdx;
                  });
                  break;
                }
              }
              
              if (headerRowIdx === -1 || colMap.name === undefined) return; 
              
              for (let i = headerRowIdx + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length === 0) continue; 
                
                const rawName = row[colMap.name];
                if (!rawName || String(rawName).trim() === '') continue; 
                
                const sets = Number(String(row[colMap.sets]).match(/\d+/)?.[0] || 1);
                let restsArr = [];
                
                if (sets > 1) {
                  let rawVal = colMap.rest !== undefined && row[colMap.rest] !== undefined ? row[colMap.rest] : "60";
                  
                  // 🟢 CORRECCIÓN: Transformar el formato de número decimal de Excel Español de regreso a texto
                  if (typeof rawVal === 'number' && !Number.isInteger(rawVal)) {
                      let parts = String(rawVal).split('.');
                      let decPart = parts[1];
                      if (decPart && decPart.length === 1) decPart += "0"; 
                      rawVal = `${parts[0]}-${decPart}`;
                  }
                  
                  // Extrae pura y exclusivamente los números del texto
                  const restsRawStr = String(rawVal);
                  const extractedNums = restsRawStr.match(/\d+/g);
                  const restsRaw = extractedNums ? extractedNums.map(Number) : [60];
                  
                  for(let j = 0; j < sets - 1; j++) {
                    let val = restsRaw[j];
                    if (val === undefined) {
                      val = restsRaw[restsRaw.length - 1] || 60;
                    }
                    restsArr.push(val);
                  }
                }
                
                let restAfterStr = String(colMap.restAfter !== undefined && row[colMap.restAfter] !== undefined ? row[colMap.restAfter] : "0");
                let parsedRestAfter = Number(restAfterStr.match(/\d+/)?.[0] || 0);

                importedExercises.push({
                  id: Date.now() + Math.random(), 
                  block: String(colMap.block !== undefined && row[colMap.block] !== undefined ? row[colMap.block] : 'General'),
                  name: String(rawName),
                  sets: sets,
                  reps: String(colMap.reps !== undefined && row[colMap.reps] !== undefined ? row[colMap.reps] : '10'),
                  intensity: String(colMap.intensity !== undefined && row[colMap.intensity] !== undefined ? row[colMap.intensity] : 'Moderado'),
                  rests: restsArr,
                  restAfterExercise: parsedRestAfter,
                  benefits: String(colMap.benefits !== undefined && row[colMap.benefits] !== undefined ? row[colMap.benefits] : ''),
                  videoUrl: String(colMap.video !== undefined && row[colMap.video] !== undefined ? row[colMap.video] : '')
                });
              }
            });

            if (importedExercises.length === 0) {
              return alert("No logré encontrar ejercicios válidos en tu Excel. Asegúrate de que los títulos (Ejercicio, Series, Repeticiones...) estén correctos.");
            }

            setExercises(prev => [...prev, ...importedExercises]);
            
            const fileNameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
            setRoutineName(prev => prev ? prev : fileNameWithoutExt);

            alert(`¡Éxito total! Se importaron ${importedExercises.length} ejercicios de tu archivo.`);
          } catch (error) {
            console.error(error);
            alert("Hubo un error crítico al leer el archivo. Intenta guardarlo de nuevo como .xlsx");
          }
          e.target.value = null; 
        };
        reader.readAsBinaryString(file);
      };

      const handleSaveRoutine = () => {
        if (!routineName) return alert("Por favor, ponle nombre a la rutina.");
        if (exercises.length === 0) return alert("Agrega al menos un ejercicio.");
        
        let finalAssignedTo = "todos";
        if (!isPublic) {
          if (initialRoutine?.assignedTo && initialRoutine.assignedTo !== "todos" && initialRoutine.assignedTo !== "nadie") {
            finalAssignedTo = initialRoutine.assignedTo;
          } else {
            finalAssignedTo = "nadie";
          }
        }

        onSave({
          id: initialRoutine?.id || `rutina_${Date.now()}`,
          name: routineName,
          assignedTo: finalAssignedTo,
          exercises: exercises
        });
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-10 font-sans">
          <div className="max-w-4xl mx-auto">
            
            <div className="flex justify-between items-center mb-8">
              <div className="flex items-center gap-4">
                <button onClick={onCancel} className="p-2 bg-white border border-slate-200 rounded-full hover:bg-slate-100 transition"><Icon name="arrow-left" size={24} /></button>
                <h1 className="text-3xl font-extrabold text-blue-950">{initialRoutine ? "Editar Rutina" : "Crear Nueva Rutina"}</h1>
              </div>
              <button onClick={handleSaveRoutine} className="bg-blue-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-800 transition flex items-center gap-2 shadow-md">
                <Icon name="save" size={20} /> Guardar Rutina
              </button>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">Nombre de la Rutina</label>
                  <input type="text" value={routineName} onChange={(e) => setRoutineName(e.target.value)} placeholder="Ej. Día de Pierna Pesado" className="w-full text-xl p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition" />
                </div>
                
                <div className="flex flex-col gap-2">
                  <label className="block text-sm font-bold text-slate-600 mb-1 flex items-center gap-2">
                    <Icon name="globe" size={16} className="text-blue-500" /> Visibilidad de la rutina
                  </label>
                  
                  <div 
                    onClick={() => setIsPublic(true)} 
                    className={`flex items-center gap-3 p-3.5 rounded-xl border cursor-pointer transition-all select-none ${isPublic ? 'bg-blue-50 border-blue-600 shadow-sm ring-1 ring-blue-600' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                  >
                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${isPublic ? 'border-blue-600' : 'border-slate-300'}`}>
                      {isPublic && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>}
                    </div>
                    <div>
                      <p className="font-bold text-blue-950 text-sm">Pública (Todos los clientes)</p>
                      <p className="text-xs text-slate-500">Visible para cualquier alumno.</p>
                    </div>
                  </div>
                  
                  <div 
                    onClick={() => setIsPublic(false)} 
                    className={`flex items-center gap-3 p-3.5 rounded-xl border cursor-pointer transition-all select-none ${!isPublic ? 'bg-blue-50 border-blue-600 shadow-sm ring-1 ring-blue-600' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                  >
                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${!isPublic ? 'border-blue-600' : 'border-slate-300'}`}>
                      {!isPublic && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>}
                    </div>
                    <div>
                      <p className="font-bold text-blue-950 text-sm">Privada (Específica)</p>
                      <p className="text-xs text-slate-500">Se asigna a clientes desde el panel "Clientes".</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                <h2 className="text-xl font-bold text-blue-950 mb-4 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <Icon name={editingExerciseIndex !== null ? "edit" : "plus-circle"} size={20} className="text-blue-600"/> 
                    {editingExerciseIndex !== null ? "Editar Ejercicio" : "Agregar Ejercicio"}
                  </div>
                  {editingExerciseIndex !== null && (
                    <button onClick={() => { setEditingExerciseIndex(null); setNewEx(defaultEx); }} className="text-xs text-slate-400 hover:text-slate-600 underline">
                      Cancelar edición
                    </button>
                  )}
                </h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Bloque / Tipo de Actividad</label>
                    <input type="text" value={newEx.block} onChange={e => setNewEx({...newEx, block: e.target.value})} placeholder="Ej. Calentamiento, Fuerza..." className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Nombre del Ejercicio</label>
                    <input type="text" value={newEx.name} onChange={e => setNewEx({...newEx, name: e.target.value})} placeholder="Ej. Sentadilla Libre" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Total de Series</label>
                      <input type="number" min="1" value={newEx.sets} onChange={e => handleSetsChange(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-900" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Repeticiones</label>
                      <input type="text" value={newEx.reps} onChange={e => setNewEx({...newEx, reps: e.target.value})} placeholder="Ej. 10 o Fallo" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>

                  {newEx.sets > 1 && (
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mt-2">
                      <label className="block text-xs font-bold text-slate-500 mb-3 flex items-center gap-2">
                        <Icon name="clock" size={14} className="text-blue-500" /> Tiempos de descanso entre series (segundos)
                      </label>
                      <div className="flex flex-wrap gap-2">
                        {newEx.rests.map((restVal, idx) => (
                          <div key={idx} className="flex items-center gap-2 bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
                            <span className="text-xs font-bold text-slate-400">S{idx + 1} ➔ S{idx + 2}</span>
                            <input 
                              type="number" min="0" step="5" 
                              value={restVal} 
                              onChange={(e) => handleRestTimeChange(idx, e.target.value)} 
                              className="w-16 p-1 text-center bg-slate-100 font-bold text-blue-900 border border-slate-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" 
                            />
                            <span className="text-xs text-slate-400">seg</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-2 gap-4 mt-2">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Intensidad / RPE</label>
                      <input 
                        list="intensity-options" 
                        type="text" 
                        value={newEx.intensity} 
                        onChange={e => setNewEx({...newEx, intensity: e.target.value})} 
                        placeholder="Ej. Pesado..." 
                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                      />
                      <datalist id="intensity-options">
                        <option value="Peso Corporal" />
                        <option value="Ligero (RIR 4+ / RPE 5-6)" />
                        <option value="Moderado (RIR 3 / RPE 7)" />
                        <option value="Pesado (RIR 2 / RPE 8)" />
                        <option value="Muy Pesado (RIR 1 / RPE 9)" />
                        <option value="Al Fallo Máximo (RIR 0 / RPE 10)" />
                        <option value="70% del 1RM" />
                        <option value="80% del 1RM" />
                      </datalist>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1" title="Descanso después de terminar todas las series de este ejercicio.">
                        Descanso final (segundos)
                      </label>
                      <input 
                        type="number" 
                        min="0" step="5" 
                        value={newEx.restAfterExercise !== undefined ? newEx.restAfterExercise : 60} 
                        onChange={e => setNewEx({...newEx, restAfterExercise: Number(e.target.value)})} 
                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-900" 
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1 mt-2">Beneficios / Notas</label>
                    <textarea rows="2" value={newEx.benefits} onChange={e => setNewEx({...newEx, benefits: e.target.value})} placeholder="¿Para qué sirve este ejercicio?" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1 mt-2">Enlace (Video o Imagen)</label>
                    <input type="url" value={newEx.videoUrl} onChange={e => setNewEx({...newEx, videoUrl: e.target.value})} placeholder="https://mi-archivo.mp4 o .jpg" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>

                  <button onClick={handleAddExercise} className={`w-full mt-4 text-white py-4 rounded-xl font-bold transition shadow-md flex justify-center items-center gap-2 ${editingExerciseIndex !== null ? 'bg-blue-600 hover:bg-blue-700' : 'bg-slate-900 hover:bg-slate-800'}`}>
                    {editingExerciseIndex !== null ? <><Icon name="save" size={20}/> Actualizar Ejercicio</> : "+ Añadir a la lista"}
                  </button>
                </div>
              </div>

              {/* Lista de Ejercicios Agregados */}
              <div>
                <h2 className="text-xl font-bold text-blue-950 mb-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                  <span>Ejercicios de la Rutina</span>
                  
                  <div className="flex items-center gap-3">
                    <label className="cursor-pointer bg-green-50 text-green-700 hover:bg-green-100 hover:border-green-300 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition border border-green-200 shadow-sm">
                      <Icon name="file-spreadsheet" size={18} /> 
                      <span className="hidden sm:inline">Importar Excel</span>
                      <span className="sm:hidden">Importar</span>
                      <input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleFileUpload} />
                    </label>

                    <span className="bg-blue-100 text-blue-900 text-sm py-2 px-4 rounded-xl font-bold">{exercises.length} agregados</span>
                  </div>
                </h2>
                
                {exercises.length === 0 ? (
                  <div className="bg-slate-100 border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center text-slate-500">
                    Aún no has agregado ejercicios. Agrégalos a mano o usa el botón de <strong>Importar Excel</strong> arriba.
                  </div>
                ) : (
                  <div className="space-y-3">
                    {exercises.map((ex, index) => (
                      <div key={ex.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4 group">
                        <div className="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                          {index + 1}
                        </div>
                        <div className="flex-1 overflow-hidden">
                          <p className="text-xs text-blue-600 font-bold uppercase tracking-wider">{ex.block}</p>
                          <h4 className="font-bold text-slate-800 truncate">{ex.name}</h4>
                          <p className="text-sm text-slate-500">
                            {ex.sets} series x {ex.reps} • Descansos: {ex.rests && ex.rests.length > 0 ? ex.rests.join('s / ')+'s' : '0s'} • Transición: {ex.restAfterExercise || 0}s
                          </p>
                        </div>
                        <div className="flex flex-col gap-1">
                          <button onClick={() => handleEditExercise(index)} className="text-slate-300 hover:text-blue-500 transition p-1" title="Editar">
                            <Icon name="edit" size={18} />
                          </button>
                          <button onClick={() => handleRemoveExercise(index)} className="text-slate-300 hover:text-red-500 transition p-1" title="Eliminar">
                            <Icon name="trash-2" size={18} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // COMPONENTE: GESTIÓN DE CLIENTES
    // ==========================================
    function ClientManager({ routines, saveRoutinesToDB, onGoBack }) {
      const [searchEmail, setSearchEmail] = useState('');
      const [selectedClient, setSelectedClient] = useState(null);

      useEffect(() => { lucide.createIcons(); });

      const clientsSet = new Set();
      routines.forEach(r => {
        if (r.assignedTo && r.assignedTo !== "todos" && r.assignedTo !== "nadie") {
          r.assignedTo.split(',').forEach(email => {
            const trimmed = email.trim().toLowerCase();
            if (trimmed) clientsSet.add(trimmed);
          });
        }
      });
      
      if (selectedClient) clientsSet.add(selectedClient.toLowerCase());
      
      const clients = Array.from(clientsSet).sort();
      const filteredClients = clients.filter(c => c.includes(searchEmail.toLowerCase()));

      const handleSelectClient = (email) => {
        setSelectedClient(email);
      };

      const handleAddSearchedClient = () => {
        if (searchEmail && searchEmail.includes('@')) {
          setSelectedClient(searchEmail.toLowerCase());
          setSearchEmail('');
        } else {
          alert('Por favor, ingresa un correo válido con @.');
        }
      };

      const handleToggleRoutine = async (routine, isAssigned) => {
        let emails = routine.assignedTo && routine.assignedTo !== "todos" && routine.assignedTo !== "nadie"
          ? routine.assignedTo.split(',').map(e => e.trim().toLowerCase()).filter(e => e) 
          : [];
          
        if (isAssigned) {
          if (!emails.includes(selectedClient)) emails.push(selectedClient);
        } else {
          emails = emails.filter(e => e !== selectedClient);
        }
        
        const newAssignedTo = emails.length > 0 ? emails.join(', ') : "nadie";
        await saveRoutinesToDB({ ...routine, assignedTo: newAssignedTo }, false);
      };

      const handleRemoveClientCompletely = async (emailToRemove) => {
        if (confirm(`¿Estás seguro de revocar TODOS los accesos a ${emailToRemove}? Ya no podrá ver ninguna rutina privada.`)) {
          
          const routinesToUpdate = routines.filter(r => {
            if (!r.assignedTo || r.assignedTo === "todos" || r.assignedTo === "nadie") return false;
            const emails = r.assignedTo.split(',').map(e => e.trim().toLowerCase());
            return emails.includes(emailToRemove);
          });

          for (const routine of routinesToUpdate) {
            let emails = routine.assignedTo.split(',').map(e => e.trim().toLowerCase());
            emails = emails.filter(e => e !== emailToRemove);
            const newAssignedTo = emails.length > 0 ? emails.join(', ') : "nadie";
            await saveRoutinesToDB({ ...routine, assignedTo: newAssignedTo }, false);
          }

          if (selectedClient === emailToRemove) {
            setSelectedClient(null);
          }
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-10 font-sans">
          <div className="max-w-6xl mx-auto flex flex-col h-full">
            
            <div className="flex items-center gap-4 mb-8">
              <button onClick={onGoBack} className="p-2 bg-white border border-slate-200 rounded-full hover:bg-slate-100 transition shadow-sm">
                <Icon name="arrow-left" size={24} />
              </button>
              <div>
                <h1 className="text-3xl font-extrabold text-blue-950">Gestión de Clientes</h1>
                <p className="text-slate-500">Asigna rutinas privadas a tus alumnos registrados.</p>
              </div>
            </div>

            <div className="flex flex-col md:flex-row gap-6">
              <div className="w-full md:w-1/3 bg-white border border-slate-200 rounded-3xl p-5 shadow-sm h-fit md:min-h-[60vh] flex flex-col">
                <div className="mb-4">
                  <div className="relative">
                    <input 
                      type="text" 
                      placeholder="Buscar o agregar correo..." 
                      value={searchEmail}
                      onChange={e => setSearchEmail(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && searchEmail && !clients.includes(searchEmail.toLowerCase()) && handleAddSearchedClient()}
                      className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600"
                    />
                    <Icon name="search" size={18} className="absolute left-3 top-3.5 text-slate-400" />
                  </div>
                  {searchEmail && !clients.includes(searchEmail.toLowerCase()) && (
                    <button onClick={handleAddSearchedClient} className="w-full mt-2 bg-blue-100 text-blue-800 hover:bg-blue-200 py-2.5 rounded-xl text-sm font-bold transition flex justify-center items-center gap-2">
                      <Icon name="user-plus" size={18} /> Agregar Cliente Nuevo
                    </button>
                  )}
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                  {filteredClients.length === 0 && !searchEmail ? (
                    <p className="text-center text-slate-400 text-sm mt-10">Aún no tienes clientes asignados. Búscalos arriba para comenzar.</p>
                  ) : (
                    filteredClients.map(email => (
                      <div key={email} className={`w-full flex items-center justify-between p-2 rounded-xl transition border ${selectedClient === email ? 'bg-blue-900 border-blue-900 shadow-md' : 'bg-slate-50 border-slate-200 hover:bg-slate-100'}`}>
                        <button 
                          onClick={() => handleSelectClient(email)}
                          className={`flex-1 flex items-center gap-3 p-2 text-left ${selectedClient === email ? 'text-white' : 'text-slate-700'}`}
                        >
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${selectedClient === email ? 'bg-blue-800 text-white' : 'bg-slate-200 text-slate-500'}`}>
                            <Icon name="user" size={16} />
                          </div>
                          <span className="truncate font-medium">{email}</span>
                        </button>
                        
                        <button 
                          onClick={(e) => { e.stopPropagation(); handleRemoveClientCompletely(email); }}
                          className={`p-2 transition rounded-full ${selectedClient === email ? 'text-blue-300 hover:text-red-400 hover:bg-blue-800' : 'text-slate-400 hover:text-red-500 hover:bg-slate-200'}`}
                          title="Revocar acceso total a este cliente"
                        >
                          <Icon name="user-minus" size={18} />
                        </button>
                      </div>
                    ))
                  )}
                </div>
              </div>

              <div className="w-full md:w-2/3 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm h-[70vh] overflow-y-auto custom-scrollbar">
                {!selectedClient ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400">
                    <Icon name="users" size={64} className="mb-4 opacity-30" />
                    <h3 className="text-xl font-bold text-slate-500">Selecciona un cliente</h3>
                    <p>Elige un correo de la lista a la izquierda para gestionar sus rutinas.</p>
                  </div>
                ) : (
                  <div>
                    <h2 className="text-2xl font-bold text-blue-950 mb-2 flex items-center gap-2">
                      <Icon name="user" size={24} className="text-blue-600" /> {selectedClient}
                    </h2>
                    <p className="text-slate-500 mb-8 border-b border-slate-100 pb-4">Activa las rutinas privadas para este alumno.</p>

                    <div className="space-y-4">
                      {routines.map(routine => {
                        const isPublic = routine.assignedTo === "todos";
                        const assignedEmails = routine.assignedTo && routine.assignedTo !== "todos" && routine.assignedTo !== "nadie" ? routine.assignedTo.split(',').map(e=>e.trim().toLowerCase()) : [];
                        const isAssigned = isPublic || assignedEmails.includes(selectedClient);

                        return (
                          <div key={routine.id} className={`flex items-center justify-between p-5 rounded-2xl border transition-all ${isAssigned ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-200'}`}>
                            <div className="flex items-center gap-4">
                              <div className={`p-3 rounded-xl ${isAssigned ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                <Icon name="activity" size={24} />
                              </div>
                              <div>
                                <h4 className={`font-bold text-lg ${isAssigned ? 'text-blue-950' : 'text-slate-600'}`}>{routine.name}</h4>
                                <p className="text-sm text-slate-500">
                                  {isPublic ? '🌍 Rutina Pública' : '🔒 Rutina Privada'} • {routine.exercises.length} ejercicios
                                </p>
                              </div>
                            </div>

                            {isPublic ? (
                              <span className="text-xs font-bold bg-slate-200 text-slate-500 px-3 py-1.5 rounded-lg whitespace-nowrap">
                                Visible por defecto
                              </span>
                            ) : (
                              <label className="relative inline-flex items-center cursor-pointer">
                                <input 
                                  type="checkbox" 
                                  className="sr-only peer" 
                                  checked={isAssigned}
                                  onChange={(e) => handleToggleRoutine(routine, e.target.checked)}
                                />
                                <div className="w-14 h-7 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600"></div>
                              </label>
                            )}
                          </div>
                        );
                      })}
                      {routines.length === 0 && (
                        <p className="text-center text-slate-400 py-10">No hay rutinas creadas en el sistema.</p>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // APP PRINCIPAL (Navegación y Memoria)
    // ==========================================
    function MainApp() {
      const [currentView, setCurrentView] = useState('home'); 
      const [activeRoutine, setActiveRoutine] = useState(null);
      const [routineToEdit, setRoutineToEdit] = useState(null);

      const [routines, setRoutines] = useState([]);
      const [isUsingCloud, setIsUsingCloud] = useState(false);
      const [supabaseClient, setSupabaseClient] = useState(null);

      const [session, setSession] = useState(null);
      const [authInitialized, setAuthInitialized] = useState(false);

      useEffect(() => { lucide.createIcons(); });

      useEffect(() => {
        if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
          const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          setSupabaseClient(client);
          setIsUsingCloud(true);

          client.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
            setAuthInitialized(true);
            if (session) fetchSupabaseRoutines(client, session.user);
          });

          const { data: { subscription } } = client.auth.onAuthStateChange((_event, session) => {
            setSession(session);
            if (session) fetchSupabaseRoutines(client, session.user);
            else setRoutines([]);
          });

          return () => subscription.unsubscribe();
        } else {
          setAuthInitialized(true);
          loadLocalRoutines();
        }
      }, []);

      const loadLocalRoutines = () => {
        try {
          const saved = window.localStorage.getItem('fuerzamexa_routines');
          setRoutines(saved ? JSON.parse(saved) : []);
        } catch (e) {
          setRoutines([]);
        }
      };

      const fetchSupabaseRoutines = async (client, currentUser) => {
        const { data, error } = await client.from('routines').select('routine_data');

        if (error) {
          console.error("Error cargando de Supabase:", error);
          loadLocalRoutines(); 
        } else if (data) {
          const allRoutines = data.map(row => row.routine_data);
          
          const userEmail = currentUser?.email?.toLowerCase() || "";
          const isAdmin = userEmail && ADMIN_EMAIL && userEmail === ADMIN_EMAIL.toLowerCase();

          const filteredRoutines = allRoutines.filter(routine => {
            if (isAdmin) return true; 
            
            const assignedTo = routine.assignedTo || "todos";
            return assignedTo === "todos" || 
                   assignedTo.toLowerCase().includes(userEmail) ||
                   routine.owner === userEmail; 
          });

          setRoutines(filteredRoutines);
        }
      };

      const saveRoutinesToDB = async (routineData, isDelete = false) => {
        const currentUser = session?.user;
        
        if (!isDelete && !routineData.owner) routineData.owner = currentUser?.email || "local_user";
        
        if (!isDelete && routineData.assignedTo === undefined) routineData.assignedTo = "todos";

        setRoutines(prevRoutines => {
          let newRoutines;
          if (isDelete) {
            newRoutines = prevRoutines.filter(r => r.id !== routineData.id);
          } else {
            const exists = prevRoutines.find(r => r.id === routineData.id);
            if (exists) newRoutines = prevRoutines.map(r => r.id === routineData.id ? routineData : r);
            else newRoutines = [...prevRoutines, routineData];
          }
          
          if (!isUsingCloud) {
            window.localStorage.setItem('fuerzamexa_routines', JSON.stringify(newRoutines));
          }
          
          return newRoutines;
        });

        if (isUsingCloud && supabaseClient && currentUser) {
          if (isDelete) {
            await supabaseClient.from('routines').delete().eq('id', routineData.id);
          } else {
            await supabaseClient.from('routines').upsert({
              id: routineData.id,
              user_id: currentUser.id,
              routine_data: routineData
            });
          }
        }
      };

      const handleStartRoutine = (routine) => {
        setActiveRoutine(routine);
        setCurrentView('workout');
      };

      const handleDeleteRoutine = (id, e) => {
        e.stopPropagation();
        if(confirm("¿Seguro que deseas eliminar esta rutina de tu sistema?")) {
          saveRoutinesToDB({ id }, true);
        }
      };

      const handleEditRoutine = (routine, e) => {
        e.stopPropagation();
        setRoutineToEdit(routine);
        setCurrentView('creator');
      };

      const handleSaveNewRoutine = (savedRoutine) => {
        saveRoutinesToDB(savedRoutine, false);
        setRoutineToEdit(null);
        setCurrentView('home');
      };

      const handleOpenCreator = () => {
        setRoutineToEdit(null);
        setCurrentView('creator');
      };

      const handleLogout = async () => {
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
          setCurrentView('home');
        }
      };

      if (!authInitialized) return <div className="min-h-screen bg-slate-50 flex items-center justify-center text-slate-500 font-bold">Cargando FuerzaMexa...</div>;

      if (isUsingCloud && !session) {
        return <AuthScreen supabaseClient={supabaseClient} />;
      }

      const isAdmin = session?.user?.email && ADMIN_EMAIL && session.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

      if (currentView === 'workout' && activeRoutine) {
        return <WorkoutPlayer routine={activeRoutine} onGoBack={() => setCurrentView('home')} />;
      }

      if (currentView === 'creator') {
        return <RoutineCreator initialRoutine={routineToEdit} onSave={handleSaveNewRoutine} onCancel={() => { setCurrentView('home'); setRoutineToEdit(null); }} />;
      }

      if (currentView === 'clients') {
        return <ClientManager routines={routines} saveRoutinesToDB={saveRoutinesToDB} onGoBack={() => setCurrentView('home')} />;
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 p-6 md:p-12 font-sans">
          <div className="max-w-5xl mx-auto">
            <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
              <div>
                <h1 className="text-4xl md:text-5xl font-black text-blue-950 mb-2 tracking-tight">FuerzaMexa <span className="text-blue-600">Pro</span></h1>
                <div className="flex flex-wrap items-center gap-3">
                  <p className="text-slate-500 font-medium text-lg">Tu centro de entrenamiento personal.</p>
                  {isUsingCloud && session ? (
                    <div className="flex items-center gap-2">
                      <span className="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-md font-bold flex items-center gap-1 border border-green-200">
                        <Icon name="user-check" size={14} /> {isAdmin ? 'ADMIN' : session.user.email}
                      </span>
                      <button onClick={handleLogout} className="text-xs font-bold text-slate-400 hover:text-red-500 transition underline">Cerrar Sesión</button>
                    </div>
                  ) : (
                    <span className="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-md font-bold flex items-center gap-1 border border-slate-300">
                      <Icon name="hard-drive" size={14} /> Modo Local
                    </span>
                  )}
                </div>
              </div>
              
              {(!isUsingCloud || isAdmin) && (
                <div className="flex gap-3 w-full md:w-auto">
                  <button onClick={() => setCurrentView('clients')} className="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-5 py-4 rounded-2xl font-bold transition shadow-sm flex items-center gap-2 flex-1 md:flex-none justify-center">
                    <Icon name="users" size={20} /> Clientes
                  </button>
                  <button onClick={handleOpenCreator} className="bg-blue-900 hover:bg-blue-800 text-white px-5 py-4 rounded-2xl font-bold transition shadow-lg flex items-center gap-2 flex-1 md:flex-none justify-center">
                    <Icon name="plus" size={20} /> Crear Rutina
                  </button>
                </div>
              )}
            </header>

            <h2 className="text-2xl font-bold text-slate-700 mb-6 flex items-center gap-2">
              <Icon name="folder" size={24} className="text-blue-600" /> Mis Rutinas Guardadas
            </h2>

            {routines.length === 0 ? (
              <div className="text-center py-20 bg-white rounded-3xl border border-slate-200 shadow-sm">
                <Icon name="dumbbell" size={64} className="mx-auto text-slate-300 mb-4" />
                <h3 className="text-xl font-bold text-slate-500 mb-2">No tienes rutinas</h3>
                <p className="text-slate-400">Comienza creando tu primer plan de entrenamiento.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {routines.map(routine => (
                  <div key={routine.id} onClick={() => handleStartRoutine(routine)} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 hover:shadow-xl hover:border-blue-300 transition-all cursor-pointer group flex flex-col h-full relative overflow-hidden">
                    
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100 group-hover:bg-blue-600 transition-colors"></div>
                    
                    <div className="flex justify-between items-start mb-4 pt-2">
                      <div className="bg-blue-50 p-3 rounded-2xl text-blue-900">
                        <Icon name="play" size={28} className="fill-current" />
                      </div>
                      
                      {/* Ocultar botones de edición si NO es Admin */}
                      {(!isUsingCloud || isAdmin) && (
                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                          <button onClick={(e) => handleEditRoutine(routine, e)} className="text-slate-300 hover:text-blue-500 p-2 transition" title="Editar rutina">
                            <Icon name="edit" size={20} />
                          </button>
                          <button onClick={(e) => handleDeleteRoutine(routine.id, e)} className="text-slate-300 hover:text-red-500 p-2 transition" title="Eliminar rutina">
                            <Icon name="trash-2" size={20} />
                          </button>
                        </div>
                      )}
                    </div>
                    
                    <h3 className="text-2xl font-bold text-blue-950 mb-2 leading-tight">{routine.name}</h3>
                    <p className="text-slate-500 font-medium flex items-center gap-2 mb-4">
                      <Icon name="activity" size={16} /> {routine.exercises.length} Ejercicios
                    </p>
                    
                    <div className="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-blue-600 font-bold text-sm group-hover:text-blue-800 transition-colors">
                      <span className="flex items-center">
                        Iniciar Entrenamiento <Icon name="arrow-right" size={16} className="ml-2 transform group-hover:translate-x-1 transition-transform" />
                      </span>
                      {isAdmin && (
                        <span className="text-xs font-normal text-slate-500 bg-slate-50 px-2 py-1 rounded border border-slate-200" title={routine.assignedTo}>
                          {routine.assignedTo === 'todos' ? 'Pública' : `Privada (${routine.assignedTo && routine.assignedTo !== 'todos' && routine.assignedTo !== 'nadie' ? routine.assignedTo.split(',').length : 0})`}
                        </span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
